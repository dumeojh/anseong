<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>2026 안성여고 교육과정 박람회</title>
    <style>
        :root { 
            --primary: #1a73e8; --bg: #f8f9fa; --border: #e0e0e0; 
            --grade2-main: #1a73e8; --grade2-bg: #e8f0fe; 
            --grade3-main: #34a853; --grade3-bg: #e6f4ea; 
        }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); overflow: hidden; }

        header { background: var(--primary); color: white; padding: 10px 15px 0 15px; flex-shrink: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 5px; list-style: none; margin: 0; padding: 0; }
        .nav-tabs li { font-size: 0.9rem; cursor: pointer; padding: 12px 20px; border-radius: 8px 8px 0 0; background: rgba(255,255,255,0.1); transition: 0.3s; }
        .nav-tabs li.active { background: white; color: var(--primary); font-weight: bold; }

        main { flex: 1; display: flex; overflow: hidden; position: relative; }
        .page-content { display: none; width: 100%; height: 100%; overflow: hidden; }
        .page-content.active { display: flex; }

        .column { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--border); }
        .column-header { background: #f1f3f4; padding: 15px; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid var(--border); color: #555; }
        .list-container { flex: 1; overflow-y: auto; }
        
        #col-group { flex: 0 0 170px; }
        #col-subject { flex: 0 0 230px; background: #fafafa; }
        #col-detail { flex: 1; background: #f8f9fa; display: flex; flex-direction: column; }

        .item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
        .item.active { background: #e8f0fe; color: var(--primary); font-weight: bold; border-left: 5px solid var(--primary); }

        .detail-title-bar { display: none; background: #fff; padding: 15px 20px; border-bottom: 1px solid var(--border); align-items: center; gap: 10px; }
        .badge-group { color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #666; }
        .badge-2 { background: var(--grade2-main) !important; }
        .badge-3 { background: var(--grade3-main) !important; }
        .subject-name-large { font-size: 1.2rem; font-weight: 800; color: #202124; }

        .info-board { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; border-bottom: 1px solid var(--border); }
        .bg-grade2 { background-color: var(--grade2-bg) !important; }
        .bg-grade3 { background-color: var(--grade3-bg) !important; }
        .info-item { display: flex; flex-direction: column; gap: 3px; padding-left: 10px; border-left: 2px solid rgba(0,0,0,0.1); }

        #viewer-container { flex: 1; overflow-y: auto; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 20px; }
        .viewer-box { width: 100%; max-width: 850px; display: none; background: #444; padding: 10px; border-radius: 4px; cursor: zoom-in; position: relative; }
        .viewer-box img { width: 100%; height: auto; display: block; }
        .zoom-guide { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; font-size: 0.7rem; padding: 5px 10px; border-radius: 20px; pointer-events: none; }

        /* 🖼️ 라이트박스 (클릭 시 원상복구) */
        #lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; 
            display: none; justify-content: center; align-items: center; 
            cursor: zoom-out; /* 돋보기 마이너스 아이콘 */
        }
        #lightbox img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; /* 이미지 전체가 다 보이도록 조절 */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #page-term { background: #f0f2f5; padding: 20px; overflow-y: auto; display: none; }
        #page-term.active { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-content: start; }
        .term-card { background: white; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; height: calc(100vh - 160px); min-height: 400px; }
        .term-header { color: white; padding: 15px; font-weight: bold; text-align: center; border-radius: 11px 11px 0 0; }
        .header-2 { background: var(--grade2-main); }
        .header-3 { background: var(--grade3-main); }
        .term-body { padding: 0; flex: 1; overflow-y: auto; background: #fff; }
        .term-subject { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }

        #loading { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 3000; flex-direction: column; gap: 10px; }
        
        @media (max-width: 768px) {
            main { overflow-y: auto; -webkit-overflow-scrolling: touch; } 
            .page-content.active { flex-direction: column; height: auto; overflow: visible; }
            .column { width: 100%; flex: none; border-right: none; border-bottom: 1px solid var(--border); }
            .list-container { max-height: 350px; } 
            #col-detail { min-height: 600px; }
            #page-term.active { grid-template-columns: 1fr; }
            .term-card { height: 500px; }
            .info-board { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="loading"><b>박람회 시스템 로딩 중...</b></div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
        <div style="position: absolute; bottom: 20px; color: white; font-size: 0.8rem; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px;">화면을 터치하면 돌아갑니다</div>
    </div>

    <header>
        <div class="logo" onclick="showPage('home')">안성여고 교육과정 박람회</div>
        <ul class="nav-tabs">
            <li id="tab-home" class="active" onclick="showPage('home')">홈</li>
            <li id="tab-subject" onclick="showPage('subject')">교과별 과목보기</li>
            <li id="tab-term" onclick="showPage('term')">학기별 과목보기</li>
        </ul>
    </header>

    <main id="main-container">
        <section id="page-home" class="page-content active" style="flex-direction: column; justify-content: center; align-items: center; background: white; text-align: center; padding: 40px;">
            <h1>2026 안성여고 교육과정 박람회</h1>
            <p>안내 자료를 터치하여 크게 보고, 다시 터치하여 돌아오세요.</p>
            <button onclick="showPage('subject')" style="margin-top:20px; padding:15px 30px; cursor:pointer; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold;">입장하기</button>
        </section>

        <section id="page-subject" class="page-content">
            <div class="column" id="col-group"><div class="column-header">1. 교과군 선택</div><div id="group-list" class="list-container"></div></div>
            <div class="column" id="col-subject"><div class="column-header" id="subject-header">2. 과목 선택</div><div id="subject-list" class="list-container"></div></div>
            <div class="column" id="col-detail">
                <div class="column-header">3. 상세 정보</div>
                <div id="detail-title-bar" class="detail-title-bar">
                    <span id="v-badge-group" class="badge-group"></span>
                    <span id="v-subject-name" class="subject-name-large"></span>
                </div>
                <div id="info-board" class="info-board">
                    <div class="info-item"><div class="info-label">학년</div><div id="v-grade"></div></div>
                    <div class="info-item"><div class="info-label">학기</div><div id="v-term"></div></div>
                    <div class="info-item"><div class="info-label">입학생기준</div><div id="v-entry"></div></div>
                    <div class="info-item"><div class="info-label">선택유형</div><div id="v-type"></div></div>
                    <div class="info-item"><div class="info-label">선택그룹</div><div id="v-sgroup"></div></div>
                    <div class="info-item"><div class="info-label">학점</div><div id="v-credit"></div></div>
                    <div class="info-item" style="grid-column: span 2;"><div class="info-label">비고</div><div id="v-note"></div></div>
                </div>
                <div id="viewer-container">
                    <div id="empty-msg" style="color:#aaa; margin-top:80px;">과목을 선택하면 안내 이미지가 나타납니다.</div>
                    <div id="box-f1" class="viewer-box" onclick="openLightbox('img-f1')">
                        <img id="img-f1">
                        <div class="zoom-guide">터치하여 확대 🔍</div>
                    </div>
                    <div id="box-f2" class="viewer-box" onclick="openLightbox('img-f2')">
                        <img id="img-f2">
                        <div class="zoom-guide">터치하여 확대 🔍</div>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-term" class="page-content"></section>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsBI-I1tIcnT0nuNa9BFcLaMzes4mIxE22VPLMGI0dFREjuifC-kvBYtNlpHaUyMCKCEHeTkwtRAKN/pub?gid=0&single=true&output=csv";
        let db = [];
        let curGIdx = null;

        // 🔍 라이트박스 열기
        function openLightbox(imgId) {
            const src = document.getElementById(imgId).src;
            if(!src || src.includes('undefined') || src === "") return;
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        // 🔍 라이트박스 닫기 (클릭 시 원상태 복귀)
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tabs li').forEach(t => t.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('main-container').scrollTop = 0;
            if(id === 'term') renderTerm();
        }

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                const grouped = {};

                rows.slice(1).forEach(row => {
                    const parseCSVRow = (str) => {
                        const result = [];
                        let current = "";
                        let inQuotes = false;
                        for (let char of str) {
                            if (char === '"') inQuotes = !inQuotes;
                            else if (char === ',' && !inQuotes) {
                                result.push(current.trim());
                                current = "";
                            } else current += char;
                        }
                        result.push(current.trim());
                        return result;
                    };
                    const cleanC = parseCSVRow(row);
                    if (cleanC.length < 2) return;
                    const gName = cleanC[0], sName = cleanC[1];
                    if(!gName || !sName) return;
                    if(!grouped[gName]) grouped[gName] = { name: gName, subjects: [] };
                    grouped[gName].subjects.push({
                        name: sName, f1: cleanC[2], f2: cleanC[3], 
                        grade: cleanC[4], term: cleanC[5], entry: cleanC[6],
                        type: cleanC[7], sgroup: cleanC[8], credit: cleanC[9], 
                        note: cleanC[10], gName: gName
                    });
                });
                db = Object.values(grouped);
                if(db.length > 0) renderGroups();
                document.getElementById('loading').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function renderGroups() {
            document.getElementById('group-list').innerHTML = db.map((g, i) => `<div class="item ${curGIdx===i?'active':''}" onclick="selectGroup(${i})">${g.name}<span>❯</span></div>`).join('');
        }

        function selectGroup(i) {
            curGIdx = i;
            renderGroups();
            resetDetail();
            document.getElementById('subject-header').innerText = `2. 과목 선택 (${db[i].name})`;
            document.getElementById('subject-list').innerHTML = db[i].subjects.map(s => `<div class="item" onclick='selectSubject(${JSON.stringify(s).replace(/'/g, "&apos;")}, this)'>${s.name}<span>❯</span></div>`).join('');
            if (window.innerWidth <= 768) document.getElementById('col-subject').scrollIntoView({ behavior: 'smooth' });
        }

        function selectSubject(s, el) {
            document.querySelectorAll('#subject-list .item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            const titleBar = document.getElementById('detail-title-bar'), badge = document.getElementById('v-badge-group'), infoBoard = document.getElementById('info-board');
            titleBar.style.display = 'flex';
            badge.innerText = s.gName;
            badge.className = 'badge-group'; 
            infoBoard.className = 'info-board';
            if(String(s.grade).includes('2')) { badge.classList.add('badge-2'); infoBoard.classList.add('bg-grade2'); }
            else if(String(s.grade).includes('3')) { badge.classList.add('badge-3'); infoBoard.classList.add('bg-grade3'); }
            document.getElementById('v-subject-name').innerText = s.name;
            document.getElementById('empty-msg').style.display = 'none';
            infoBoard.style.display = 'grid';
            document.getElementById('v-grade').innerText = s.grade || "-";
            document.getElementById('v-term').innerText = s.term || "-";
            document.getElementById('v-entry').innerText = s.entry || "-";
            document.getElementById('v-type').innerText = s.type || "-";
            document.getElementById('v-sgroup').innerText = s.sgroup || "-";
            document.getElementById('v-credit').innerText = s.credit || "-";
            document.getElementById('v-note').innerText = s.note || "-";
            const setImgViewer = (file, boxI, imgI) => {
                const box = document.getElementById(boxI), img = document.getElementById(imgI);
                if(file && file !== "-" && file !== "") {
                    box.style.display = 'block';
                    img.src = "jpgs/" + file;
                } else { box.style.display = 'none'; }
            };
            setImgViewer(s.f1, 'box-f1', 'img-f1');
            setImgViewer(s.f2, 'box-f2', 'img-f2');
            if (window.innerWidth <= 768) document.getElementById('col-detail').scrollIntoView({ behavior: 'smooth' });
        }

        function resetDetail() {
            document.getElementById('detail-title-bar').style.display = 'none';
            document.getElementById('info-board').style.display = 'none';
            document.getElementById('empty-msg').style.display = 'block';
            document.querySelectorAll('.viewer-box').forEach(b => b.style.display = 'none');
        }

        function renderTerm() {
            const layout = [{g:'2', t:'1', l:'2학년 1학기', c:'header-2'}, {g:'2', t:'2', l:'2학년 2학기', c:'header-2'}, {g:'3', t:'1', l:'3학년 1학기', c:'header-3'}, {g:'3', t:'2', l:'3학년 2학기', c:'header-3'}];
            document.getElementById('page-term').innerHTML = layout.map(lt => {
                const subs = [];
                db.forEach(g => g.subjects.forEach(s => {
                    if(String(s.grade).includes(lt.g) && String(s.term).includes(lt.t)) subs.push(s);
                }));
                return `<div class="term-card"><div class="term-header ${lt.c}">${lt.l}</div><div class="term-body">${subs.map(s => `<div class="term-subject" onclick="jump('${s.gName}', '${s.name}')">${s.name}</div>`).join('')}</div></div>`;
            }).join('');
        }

        function jump(gn, sn) {
            showPage('subject');
            const gi = db.findIndex(g => g.name === gn);
            if(gi > -1) { selectGroup(gi); const sObj = db[gi].subjects.find(s => s.name === sn); if(sObj) selectSubject(sObj, null); }
        }
        init();
    </script>
</body>
</html>
