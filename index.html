<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>2026 안성여고 교육과정 박람회</title>
    <style>
        :root { 
            --primary: #1a73e8; --bg: #f8f9fa; --border: #e0e0e0; 
            --grade2-main: #1a73e8; --grade2-bg: #e8f0fe; 
            --grade3-main: #34a853; --grade3-bg: #e6f4ea; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); overflow: hidden; }

        /* 헤더 최적화 */
        header { background: var(--primary); color: white; padding: 10px 10px 0 10px; flex-shrink: 0; z-index: 100; }
        .logo { font-size: 1rem; font-weight: bold; margin-bottom: 8px; cursor: pointer; white-space: nowrap; }
        .nav-tabs { display: flex; gap: 2px; list-style: none; margin: 0; padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .nav-tabs li { font-size: 0.85rem; cursor: pointer; padding: 10px 15px; border-radius: 8px 8px 0 0; background: rgba(255,255,255,0.1); white-space: nowrap; flex-shrink: 0; }
        .nav-tabs li.active { background: white; color: var(--primary); font-weight: bold; }

        main { flex: 1; display: flex; overflow: hidden; position: relative; }
        .page-content { display: none; width: 100%; height: 100%; overflow: hidden; }
        .page-content.active { display: flex; }

        /* 컬럼 레이아웃 (PC) */
        .column { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--border); }
        .column-header { background: #f1f3f4; padding: 12px; font-weight: bold; font-size: 0.8rem; border-bottom: 1px solid var(--border); color: #555; }
        .list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #col-group { flex: 0 0 160px; }
        #col-subject { flex: 0 0 200px; background: #fafafa; }
        #col-detail { flex: 1; background: #f8f9fa; display: flex; flex-direction: column; }

        .item { padding: 15px 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
        .item.active { background: #e8f0fe; color: var(--primary); font-weight: bold; border-left: 5px solid var(--primary); }

        /* 상세 정보창 */
        .detail-title-bar { display: none; background: #fff; padding: 15px; border-bottom: 1px solid var(--border); align-items: center; gap: 8px; flex-wrap: wrap; }
        .badge-group { color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-2 { background: var(--grade2-main); }
        .badge-3 { background: var(--grade3-main); }
        .subject-name-large { font-size: 1.1rem; font-weight: 800; }

        .info-board { display: none; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; padding: 12px; border-bottom: 1px solid var(--border); }
        .info-item { display: flex; flex-direction: column; gap: 2px; padding-left: 8px; border-left: 2px solid rgba(0,0,0,0.1); font-size: 0.8rem; }
        .info-label { color: #888; font-size: 0.7rem; }

        #viewer-container { flex: 1; overflow-y: auto; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 15px; gap: 15px; }
        .viewer-box { width: 100%; max-width: 800px; display: none; background: #444; padding: 5px; border-radius: 4px; }
        .viewer-box img { width: 100%; height: auto; display: block; }

        /* 🖼️ 라이트박스: 모바일/패드 최적화 */
        #lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; 
            display: none; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        #lightbox img { 
            display: block; width: 100%; height: auto;
            margin: 0 auto; padding: 20px 0;
        }

        /* 📱 모바일/태블릿 대응 (768px 이하) */
        @media (max-width: 768px) {
            .page-content.active { flex-direction: column; overflow-y: auto; }
            .column { border-right: none; border-bottom: 1px solid var(--border); flex: none !important; width: 100%; }
            .list-container { max-height: 250px; } /* 리스트 영역 제한 */
            #col-detail { height: auto; overflow: visible; }
            .info-board { grid-template-columns: repeat(2, 1fr); } /* 2열로 변경 */
            .subject-name-large { width: 100%; }
        }

        /* 학기별 보기 카드 최적화 */
        #page-term.active { background: #f0f2f5; padding: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; overflow-y: auto; }
        .term-card { background: white; border-radius: 12px; display: flex; flex-direction: column; height: auto; min-height: 300px; margin-bottom: 10px; }
        
        #loading { position:fixed; inset:0; background:white; z-index:3000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="loading"><b>데이터 로딩 중...</b></div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
        <div style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:white; background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:20px; font-size:0.75rem; pointer-events:none; white-space:nowrap;">
            터치하여 닫기 | 손가락으로 확대 가능
        </div>
    </div>

    <header>
        <div class="logo" onclick="showPage('home')">안성여고 교육과정 박람회</div>
        <ul class="nav-tabs">
            <li id="tab-home" class="active" onclick="showPage('home')">홈</li>
            <li id="tab-subject" onclick="showPage('subject')">교과별</li>
            <li id="tab-term" onclick="showPage('term')">학기별</li>
        </ul>
    </header>

    <main id="main-container">
        <section id="page-home" class="page-content active" style="flex-direction:column; justify-content:center; align-items:center; background:white; text-align:center; padding:20px;">
            <h1 style="font-size:1.5rem;">2026 안성여고<br>교육과정 박람회</h1>
            <p style="font-size:0.9rem; color:#666;">과목별 상세 정보와 안내 자료를<br>편리하게 확인하세요.</p>
            <button onclick="showPage('subject')" style="margin-top:20px; padding:15px 40px; background:var(--primary); color:white; border:none; border-radius:30px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 10px rgba(26,115,232,0.3);">시작하기</button>
        </section>

        <section id="page-subject" class="page-content">
            <div class="column" id="col-group">
                <div class="column-header">1. 교과군</div>
                <div id="group-list" class="list-container"></div>
            </div>
            <div class="column" id="col-subject">
                <div class="column-header" id="subject-header">2. 과목 선택</div>
                <div id="subject-list" class="list-container"></div>
            </div>
            <div class="column" id="col-detail">
                <div class="column-header">3. 상세 정보</div>
                <div id="detail-title-bar" class="detail-title-bar">
                    <span id="v-badge-group" class="badge-group"></span>
                    <span id="v-subject-name" class="subject-name-large"></span>
                </div>
                <div id="info-board" class="info-board">
                    <div class="info-item"><div class="info-label">학년</div><div id="v-grade"></div></div>
                    <div class="info-item"><div class="info-label">학기</div><div id="v-term"></div></div>
                    <div class="info-item"><div class="info-label">입학생기준</div><div id="v-entry"></div></div>
                    <div class="info-item"><div class="info-label">유형</div><div id="v-type"></div></div>
                    <div class="info-item"><div class="info-label">학점</div><div id="v-credit"></div></div>
                    <div class="info-item" style="grid-column: span 2;"><div class="info-label">비고</div><div id="v-note"></div></div>
                </div>
                <div id="viewer-container">
                    <div id="empty-msg" style="color:#aaa; margin-top:50px; font-size:0.9rem;">과목을 선택하세요.</div>
                    <div id="box-f1" class="viewer-box" onclick="openLightbox('img-f1')"><img id="img-f1"></div>
                    <div id="box-f2" class="viewer-box" onclick="openLightbox('img-f2')"><img id="img-f2"></div>
                </div>
            </div>
        </section>

        <section id="page-term" class="page-content"></section>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsBI-I1tIcnT0nuNa9BFcLaMzes4mIxE22VPLMGI0dFREjuifC-kvBYtNlpHaUyMCKCEHeTkwtRAKN/pub?gid=0&single=true&output=csv";
        let db = [];

        function openLightbox(imgId) {
            const src = document.getElementById(imgId).src;
            if(!src || src.includes('undefined')) return;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = src;
            document.getElementById('lightbox').style.display = 'block';
            document.getElementById('lightbox').scrollTop = 0;
        }

        function closeLightbox() { 
            document.getElementById('lightbox').style.display = 'none'; 
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tabs li').forEach(t => t.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.getElementById('tab-'+id).classList.add('active');
            if(id === 'term') renderTerm();
        }

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                const grouped = {};
                rows.slice(1).forEach(row => {
                    const parseCSVRow = (str) => {
                        const result = []; let current = "", inQuotes = false;
                        for (let char of str) {
                            if (char === '"') inQuotes = !inQuotes;
                            else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ""; }
                            else current += char;
                        }
                        result.push(current.trim()); return result;
                    };
                    const cleanC = parseCSVRow(row);
                    if (cleanC.length < 2) return;
                    const gn = cleanC[0];
                    if(!grouped[gn]) grouped[gn] = { name: gn, subjects: [] };
                    grouped[gn].subjects.push({ name: cleanC[1], f1: cleanC[2], f2: cleanC[3], grade: cleanC[4], term: cleanC[5], entry: cleanC[6], type: cleanC[7], sgroup: cleanC[8], credit: cleanC[9], note: cleanC[10], gName: gn });
                });
                db = Object.values(grouped);
                if(db.length > 0) renderGroups();
                document.getElementById('loading').remove();
            } catch (e) { console.error(e); }
        }

        function renderGroups() { 
            document.getElementById('group-list').innerHTML = db.map((g, i) => `<div class="item" onclick="selectGroup(${i})">${g.name}<span>❯</span></div>`).join(''); 
        }
        
        function selectGroup(i) {
            document.getElementById('subject-header').innerText = `2. 과목 선택 (${db[i].name})`;
            document.getElementById('subject-list').innerHTML = db[i].subjects.map(s => `<div class="item" onclick='selectSubject(${JSON.stringify(s).replace(/'/g, "&apos;")}, this)'>${s.name}<span>❯</span></div>`).join('');
            // 모바일에서 그룹 선택 시 과목 리스트로 스크롤 이동
            if(window.innerWidth <= 768) {
                document.getElementById('col-subject').scrollIntoView({behavior: 'smooth'});
            }
        }

        function selectSubject(s, el) {
            if(el) {
                document.querySelectorAll('#subject-list .item').forEach(i => i.classList.remove('active')); 
                el.classList.add('active');
            }
            document.getElementById('detail-title-bar').style.display = 'flex';
            const badge = document.getElementById('v-badge-group');
            badge.innerText = s.gName; 
            badge.className = 'badge-group ' + (String(s.grade).includes('2') ? 'badge-2' : 'badge-3');
            const infoBoard = document.getElementById('info-board');
            infoBoard.className = 'info-board ' + (String(s.grade).includes('2') ? 'bg-grade2' : 'bg-grade3');
            infoBoard.style.display = 'grid';
            document.getElementById('v-subject-name').innerText = s.name;
            document.getElementById('empty-msg').style.display = 'none';
            ['grade','term','entry','type','credit','note'].forEach(k => document.getElementById('v-'+k).innerText = s[k] || "-");
            
            const setImg = (f, b, i) => { 
                const box = document.getElementById(b), img = document.getElementById(i); 
                if(f && f !== "-") { box.style.display = 'block'; img.src = "jpgs/" + f; } 
                else { box.style.display = 'none'; } 
            };
            setImg(s.f1, 'box-f1', 'img-f1'); setImg(s.f2, 'box-f2', 'img-f2');

            // 모바일에서 과목 선택 시 상세 정보로 스크롤 이동
            if(window.innerWidth <= 768) {
                document.getElementById('col-detail').scrollIntoView({behavior: 'smooth'});
            }
        }

        function renderTerm() {
            const layout = [{g:'2', t:'1', l:'2학년 1학기', c:'header-2'}, {g:'2', t:'2', l:'2학년 2학기', c:'header-2'}, {g:'3', t:'1', l:'3학년 1학기', c:'header-3'}, {g:'3', t:'2', l:'3학년 2학기', c:'header-3'}];
            document.getElementById('page-term').innerHTML = layout.map(lt => {
                const subs = []; db.forEach(g => g.subjects.forEach(s => { if(String(s.grade).includes(lt.g) && String(s.term).includes(lt.t)) subs.push(s); }));
                return `<div class="term-card"><div class="term-header ${lt.c}">${lt.l}</div><div class="term-body">${subs.map(s => `<div class="term-subject" onclick="jump('${s.gName}', '${s.name}')">${s.name}</div>`).join('')}</div></div>`;
            }).join('');
        }

        function jump(gn, sn) { 
            showPage('subject'); 
            const gi = db.findIndex(g => g.name === gn); 
            if(gi > -1) { 
                selectGroup(gi); 
                setTimeout(() => {
                    const sObj = db[gi].subjects.find(s => s.name === sn);
                    const items = document.querySelectorAll('#subject-list .item');
                    items.forEach(item => { if(item.innerText.includes(sn)) selectSubject(sObj, item); });
                }, 100);
            } 
        }
        init();
    </script>
</body>
</html>
